# 打 tag（如 v1.0.1 或 1.0.1）后：同步版本号 → 导出 Web/Win/macOS/Android → 上传 GitHub Release；
# 若配置 Netlify 密钥，同时将 Web 同步到线上试玩站点。
name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (keytool，生成/使用 Android 签名库)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Export all platforms
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: bash scripts/ci/release_export.sh

      - name: Setup Node (Netlify CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy Web to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          if [ -z "${NETLIFY_AUTH_TOKEN:-}" ] || [ -z "${NETLIFY_SITE_ID:-}" ]; then
            echo "::notice::已跳过 Netlify：请在仓库 Settings → Secrets 中配置 NETLIFY_AUTH_TOKEN 与 NETLIFY_SITE_ID"
            exit 0
          fi
          npx --yes netlify-cli deploy --prod --dir="${GITHUB_WORKSPACE}/export_build/web"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
